general {
    grace = 300
    fail_timeout = 2000
}

# Fondo: blur aún más ligero para distinguir la imagen
background {
    monitor = DP-1
    path = /datos/Horizontal.jpeg
    blur_passes = 2
    blur_size = 7             # bajado un poco más
    noise = 0.015
    contrast = 0.92
    brightness = 0.75         # más claridad
    color = rgba(00000077)    # overlay más transparente
}

background {
    monitor = HDMI-1
    color = rgb(0, 0, 0)
}


# Hora grande (Subida para dejar espacio)
label {
    monitor = DP-1
    text = cmd[update:1000] TZ='America/Tijuana' date '+%I:%M %p' | sed 's/^0//'
    color = rgba(255, 255, 255, 0.6)
    font_size = 120
    font_family = Inter
    shadow_passes = 2
    position = 0, 440
    halign = center
    valign = center
}

# Ícono de usuario
image {
    monitor = DP-1
    path = /home/me1mori/.config/hypr/face.png
    size = 100
    rounding = -1
    border_size = 2
    border_color = rgba(255, 255, 255, 0.3)
    shadow_passes = 2
    shadow_color = rgb(0, 0, 0)
    position = 20, -20
    halign = left
    valign = top
}

# Nombre de usuario (Al lado del ícono)
label {
    monitor = DP-1
    text = Me1mori
    color = rgba(eeeeeecc)
    font_size = 32
    font_family = Inter
    font_weight = 300
    position = 140, -40
    halign = left
    valign = top
}

# Campo de contraseña (muy abajo, casi en la parte inferior)
input-field {
    monitor = DP-1
    size = 420, 68
    outline_thickness = 2
    outer_color = rgba(ffffff55)
    inner_color = rgba(00000066)
    font_color = rgb(0, 0, 0)
    fade_on_empty = true
    font_size = 28
    placeholder_text = <i>contraseña</i>
    hide_input = false
    rounding = 24
    check_color = rgb(88cc88)
    fail_color = rgb(cc5555)
    fail_text = <i>incorrecta</i> <b>($ATTEMPTS/3)</b>
    capslock_color = rgb(cccc88)
    position = 0, 40
    halign = center
    valign = bottom
}

# FECHA EN CASCADA
label {
    monitor = DP-1
    # %A devuelve el nombre completo (Lunes, Martes...)
    text = cmd[update:3600] TZ='America/Tijuana' echo -e "<span weight='bold'>$(date '+%A')</span>\n$(date '+%d')\n<span size='large'>$(date '+%B')</span>"
    color = rgba(255, 255, 255, 0.8)
    font_size = 30
    font_family = Inter
    shadow_passes = 3         # Intensidad de la sombra
    shadow_size = 4           # Tamaño del desenfoque
    shadow_color = rgb(0, 0, 0) # Sombra negra para contraste
    shadow_boost = 1.2        # Brillo de la sombra
    position = 40, -140
    halign = left
    valign = center
    text_align = left
}

# CLIMA (Con estilo similar para consistencia)
label {
    monitor = DP-1
    text = cmd[update:1800] ~/.config/hypr/scripts/clima.sh
    color = rgba(220, 220, 220, 0.8)
    font_size = 20
    font_family = Inter
    shadow_passes = 2
    shadow_color = rgb(0, 0, 0)
    position = 40, -40
    halign = left
    valign = center
    text_align = left
}

# Información lateral derecha
label {
    monitor = DP-1
    text = cmd[update:30] ~/.config/hypr/scripts/network.sh
    color = rgba(255, 255, 255, 0.8)
    font_size = 22
    font_family = Inter Nerd Font
    shadow_passes = 3
    shadow_size = 4
    shadow_color = rgb(0, 0, 0)
    position = -40, 0
    halign = right
    valign = center
}
